name: Deploy Odontologia

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # Descargar código del repositorio
      - name: Checkout
        uses: actions/checkout@v4


      # Instalar Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      # Instalar dependencias
      - name: Install dependencies
        run: npm ci


      # Generar Prisma Client
      - name: Prisma Generate
        run: npx prisma generate


      # Compilar Next.js
      - name: Build Next.js
        run: npm run build


      # Subir archivos a EC2
      - name: Deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,prisma"
          target: "/var/www/odontologia"


      # Reiniciar aplicación
      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/odontologia

            npm ci --omit=dev

            npx prisma generate

            pm2 reload odontologia